# Production compose for Coolify deploy.
# - Build context: repo root (matches what backend/Dockerfile and frontend/Dockerfile expect)
# - NO host port mappings: Coolify routes traffic via Traefik labels it injects automatically
#   (the port-bind error in the previous deploy was because the dev compose used `ports:`)
# - api migrates first; worker depends on api being up so they don't race for alembic_version
# - Service FQDNs are configured in Coolify UI per service (Domains tab)
#
# To use this in Coolify: app config -> "Docker Compose" tab -> set "Compose file location"
# to `docker-compose.prod.yml`, then redeploy.

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-siete}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-siete_academy}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-siete} -d ${POSTGRES_DB:-siete_academy}"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      APP_ENV: production
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-siete}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-siete_academy}
      REDIS_URL: redis://redis:6379/0
      DEV_AUTH_BYPASS: "false"
      CELERY_ALWAYS_EAGER: "false"
      APP_SECRET_KEY: ${APP_SECRET_KEY}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      FIREBASE_CREDENTIALS_JSON: ${FIREBASE_CREDENTIALS_JSON:-}
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-opus-4-7}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-Siete Academy <noreply@siete.com>}
      WEB_CONCURRENCY: ${WEB_CONCURRENCY:-3}
    expose:
      - "8000"
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: ["/usr/local/bin/entrypoint-worker.sh"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_started
    environment:
      APP_ENV: production
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-siete}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-siete_academy}
      REDIS_URL: redis://redis:6379/0
      DEV_AUTH_BYPASS: "false"
      CELERY_ALWAYS_EAGER: "false"
      APP_SECRET_KEY: ${APP_SECRET_KEY}
      FIREBASE_CREDENTIALS_JSON: ${FIREBASE_CREDENTIALS_JSON:-}
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-opus-4-7}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-Siete Academy <noreply@siete.com>}
      CELERY_CONCURRENCY: ${CELERY_CONCURRENCY:-2}
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api/academy}
        VITE_FIREBASE_API_KEY: ${VITE_FIREBASE_API_KEY:-}
        VITE_FIREBASE_AUTH_DOMAIN: ${VITE_FIREBASE_AUTH_DOMAIN:-}
        VITE_FIREBASE_PROJECT_ID: ${VITE_FIREBASE_PROJECT_ID:-}
        VITE_FIREBASE_STORAGE_BUCKET: ${VITE_FIREBASE_STORAGE_BUCKET:-}
        VITE_FIREBASE_MESSAGING_SENDER_ID: ${VITE_FIREBASE_MESSAGING_SENDER_ID:-}
        VITE_FIREBASE_APP_ID: ${VITE_FIREBASE_APP_ID:-}
    expose:
      - "80"
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
